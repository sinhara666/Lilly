<!DOCTYPE html>
<html>
<head>
  <title>Lilly - Restaurant Receptionist Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Space Mono', monospace;
      background-color: #06080f;
      color: #f0faff;
      margin: 0;
      padding: 0;
    }
    .surface {
      background-color: #0c1020;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
    }
    .accent {
      color: #cc00ff;
    }
    .cyan {
      color: #00f0ff;
    }
    .green {
      color: #00ff88;
    }
    .button {
      padding: 8px 16px;
      border: none;
      border-radius: 16px;
      background-color: #0c1020;
      color: #f0faff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(204, 0, 255, 0.5);
    }
    .button:hover {
      box-shadow: 0 0 16px rgba(204, 0, 255, 0.8);
    }
    .sidebar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100vh;
      background-color: #0c1020;
      padding: 16px;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
    }
    .sidebar-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      cursor: pointer;
      z-index: 9999;
    }
    .main-area {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .message {
      margin-bottom: 16px;
    }
    .user-message {
      background-color: #00f0ff;
      padding: 8px 16px;
      border-radius: 16px;
      align-self: flex-end;
    }
    .bot-message {
      background-color: #cc00ff;
      padding: 8px 16px;
      border-radius: 16px;
      align-self: flex-start;
    }
    .typing-indicator {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .input-row {
      padding: 16px;
      border-top: 1px solid #0c1020;
    }
    .input {
      width: 100%;
      padding: 8px 16px;
      border: none;
      border-radius: 16px;
      background-color: #0c1020;
      color: #f0faff;
    }
    .send-button {
      padding: 8px 16px;
      border: none;
      border-radius: 16px;
      background-color: #0c1020;
      color: #f0faff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(204, 0, 255, 0.5);
    }
    .send-button:hover {
      box-shadow: 0 0 16px rgba(204, 0, 255, 0.8);
    }
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
    }
    .settings-modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #0c1020;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
    }
    .password-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
    }
    .password-modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #0c1020;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
    }
    @media (min-width: 768px) {
      .sidebar {
        display: block;
      }
      .sidebar-toggle {
        display: none;
      }
      .main-area {
        margin-left: 240px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</div>
  <div class="sidebar">
    <div class="accent" style="font-size: 24px;">Lilly</div>
    <div class="cyan" style="font-size: 18px;">Restaurant Receptionist Bot</div>
    <div class="green" style="font-size: 18px;">&#9679;</div>
    <button class="button" onclick="suggestPrompt('What are your business hours?')">What are your business hours?</button>
    <button class="button" onclick="suggestPrompt('Do you have any specials today?')">Do you have any specials today?</button>
    <button class="button" onclick="suggestPrompt('Can I make a reservation for 5 people?')">Can I make a reservation for 5 people?</button>
    <button class="button" onclick="suggestPrompt('What is your cancellation policy?')">What is your cancellation policy?</button>
    <button class="button" onclick="suggestPrompt('Do you have any vegetarian options?')">Do you have any vegetarian options?</button>
  </div>
  <div class="main-area">
    <div class="header accent">Lilly</div>
    <div class="messages" id="messages">
      <div class="message bot-message">Hello! Welcome to our restaurant. How can I assist you today?</div>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message...">
      <button class="send-button" id="send-button" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <div class="settings-modal" id="settings-modal">
    <div class="settings-modal-content">
      <input type="text" id="groq-key" placeholder="Enter your Groq key...">
      <button class="button" onclick="saveGroqKey()">Save</button>
    </div>
  </div>
  <div class="password-modal" id="password-modal">
    <div class="password-modal-content">
      <input type="password" id="password" placeholder="Enter password...">
      <button class="button" onclick="checkPassword()">Submit</button>
    </div>
  </div>
  <div style="position: fixed; bottom: 0; left: 0; width: 44px; height: 44px; opacity: 0; cursor: pointer; z-index: 9999;" onclick="showPasswordModal()"></div>
  <script>
    const SYSTEM_PROMPT = "You are Lilly, expert Receptionist Bot for Restaurant. Speak English. Help with: Appointment intake, Lead qualification, FAQ answers, After-hours replies. Stay in character. Keep replies to 2-4 sentences.";
    const history = [];
    let groqKey = '';
    let settingsModal = document.getElementById('settings-modal');
    let passwordModal = document.getElementById('password-modal');
    let input = document.getElementById('input');
    let sendButton = document.getElementById('send-button');
    let messages = document.getElementById('messages');
    function toggleSidebar() {
      document.querySelector('.sidebar').style.transform = document.querySelector('.sidebar').style.transform === 'translateX(0)' ? 'translateX(-100%)' : 'translateX(0)';
    }
    function suggestPrompt(prompt) {
      input.value = prompt;
    }
    function sendMessage() {
      const userMsg = input.value;
      if (userMsg.trim() === '') return;
      history.push({ role: 'user', content: userMsg });
      callGroq([{ role: 'system', content: SYSTEM_PROMPT }, ...history.slice(-10)]).then(reply => {
        history.push({ role: 'assistant', content: reply });
        renderMessages();
      });
      input.value = '';
    }
    function renderMessages() {
      messages.innerHTML = '';
      history.forEach(message => {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        if (message.role === 'user') {
          messageDiv.className += ' user-message';
        } else {
          messageDiv.className += ' bot-message';
        }
        messageDiv.textContent = message.content;
        messages.appendChild(messageDiv);
      });
    }
    function callGroq(msgs) {
      return new Promise((resolve, reject) => {
        const raw = localStorage.getItem('_bk');
        const key = raw ? xorStr(raw, 'SINSTUDIO') : '';
        fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: msgs, max_tokens: 400 })
        }).then(r => r.json()).then(d => {
          if (!r.ok) reject(new Error(d.error?.message || 'Groq error'));
          resolve(d.choices[0].message.content);
        }).catch(reject);
      });
    }
    function xorStr(a, b) {
      let o = '';
      for (let i = 0; i < a.length; i++) {
        o += String.fromCharCode(a.charCodeAt(i) ^ b.charCodeAt(i % b.length));
      }
      return o;
    }
    function showPasswordModal() {
      passwordModal.style.display = 'block';
    }
    function checkPassword() {
      const password = document.getElementById('password').value;
      if (password === 'damnit') {
        passwordModal.style.display = 'none';
        settingsModal.style.display = 'block';
      }
    }
    function saveGroqKey() {
      const key = document.getElementById('groq-key').value;
      localStorage.setItem('_bk', xorStr(key, 'SINSTUDIO'));
      settingsModal.style.display = 'none';
      groqKey = key;
      sendButton.disabled = false;
    }
    function init() {
      const raw = localStorage.getItem('_bk');
      if (raw) {
        groqKey = xorStr(raw, 'SINSTUDIO');
        sendButton.disabled = false;
      } else {
        sendButton.disabled = true;
        messages.innerHTML = '<div class="message">Contact the owner to get access</div>';
      }
    }
    init();
  </script>
</html>
